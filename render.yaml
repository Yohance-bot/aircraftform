databases:
  - name: amc-db
    plan: free

services:
  - type: web
    name: amc-backend
    env: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: amc-db
          property: connectionString
      - key: ADMIN_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.9

  - type: web
    name: amc-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
